<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> By Jayant </title>
<title>Happy Birthday Drishti 🎉</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', cursive;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: #fff;
      overflow: hidden;
    }

    h1 {
      margin-top: 100px;
      font-size: 3em;
      animation: fadeIn 2s ease-in-out;
    }

    p {
      font-size: 1.5em;
      margin: 20px;
      animation: fadeIn 3s ease-in-out;
    }

    .heart {
      color: red;
      font-size: 2em;
      animation: heartbeat 1s infinite;
    }

    button {
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 25px;
      background-color: #fff;
      color: #ff6f91;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #ff6f91;
      color: #fff;
    }

    @keyframes fadeIn {
from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.2); }
      50% { transform: scale(1); }
      75% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .hidden-message {
      display: none;
      margin-top: 20px;
      font-size: 1.3em;
    }
  </style>
</head>
<body>

  <h1>🎉 Happy Birthday Drishti 🎂</h1>
  <p>
    To my Classmate 💖<br>
    You make my School life brighter, happier, and full of laughter!  
  </p>

  <div class="heart">❤️</div>

  <button onclick="showMessage()">Click for a Surprise 🎁</button>

<div class="hidden-message" id="message">
    You are My Classmate 💕<br>
    I’m so lucky to have you in my School life.  
    Stay amazing forever Drishti 🌸✨
  </div>

  <script>
    function showMessage() {
      document.getElementById("message").style.display = "block";
    }
  </script>

</body>
</html>
